<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lending Confirmation Modal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex relative overflow-hidden">
<nav class="fixed top-0 left-0 h-screen w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 z-10 flex flex-col">
<div class="flex items-center h-16 px-6 border-b border-slate-200 dark:border-slate-700 shrink-0">
<span class="text-slate-900 dark:text-slate-100 text-lg font-bold tracking-tight">Company Name</span>
</div>
<div class="flex-1 py-4 overflow-y-auto px-3 space-y-1">
<a class="flex items-center gap-3 px-3 py-2 text-slate-700 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors" href="#">
<span class="material-symbols-outlined text-xl">dashboard</span>
<span class="text-sm font-medium">Dashboard</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 text-slate-700 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors" href="#">
<span class="material-symbols-outlined text-xl">inventory_2</span>
<span class="text-sm font-medium">Inventory</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 bg-primary/10 text-primary dark:text-primary rounded-lg" href="#">
<span class="material-symbols-outlined text-xl">qr_code_scanner</span>
<span class="text-sm font-medium">Lending</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 text-slate-700 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors" href="#">
<span class="material-symbols-outlined text-xl">keyboard_return</span>
<span class="text-sm font-medium">Return</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 text-slate-700 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors" href="#">
<span class="material-symbols-outlined text-xl">group</span>
<span class="text-sm font-medium">Users</span>
</a>
<a class="flex items-center gap-3 px-3 py-2 text-slate-700 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors" href="#">
<span class="material-symbols-outlined text-xl">history</span>
<span class="text-sm font-medium">History</span>
</a>
</div>
<div class="p-3 border-t border-slate-200 dark:border-slate-700">
<a class="flex items-center gap-3 px-3 py-2 text-slate-700 dark:text-slate-300 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors" href="#">
<span class="material-symbols-outlined text-xl">settings</span>
<span class="text-sm font-medium">Setting</span>
</a>
</div>
</nav>
<div class="absolute inset-0 pl-64 z-0 p-8 opacity-20 dark:opacity-10 pointer-events-none flex flex-col items-center justify-center">
<div class="max-w-4xl w-full mx-auto grid grid-cols-3 gap-6">
<div class="h-48 bg-slate-300 dark:bg-slate-700 rounded-lg"></div>
<div class="h-48 bg-slate-300 dark:bg-slate-700 rounded-lg"></div>
<div class="h-48 bg-slate-300 dark:bg-slate-700 rounded-lg"></div>
<div class="col-span-3 h-96 bg-slate-300 dark:bg-slate-700 rounded-lg mt-8"></div>
</div>
</div>
<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 flex items-center justify-center px-4">
<div class="bg-white dark:bg-slate-800 rounded-xl shadow-xl w-full max-w-[480px] overflow-hidden flex flex-col">
<div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">Confirm Lending</h3>
<button class="text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</div>
<div class="flex-1 overflow-y-auto px-6 py-4">
<div class="flex items-center gap-4 bg-slate-50 dark:bg-slate-900/50 rounded-lg p-4 mb-6 border border-slate-100 dark:border-slate-700">
<div class="bg-center bg-no-repeat bg-cover rounded-lg size-16 shrink-0" data-alt="professional camera body top view" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBQuHGR8zKeTURAQCjByorzol2NOKh-TJtBGf0HAs6H_lehRDu6vHNZBWip1taYhO1g29Oq6sbmz2idSv6XV7Hcje0ml7Jx1okmrUUmElymK_ZrNxmZd15iA2zRSHSt57GxUAhtZKme5ffoA-pKiPleKYhmOoveSy2MNXGOl5bHJotlL7U-CY4w5UqceTL6ATamDyk-ZVRQwtWGFeXa44BSteA3HbTCx1IScUrynbAB9kgdpcsiTfErV6Ko6uWmqwgVMS3I4OH679iB");'></div>
<div class="flex flex-col justify-center flex-1">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal line-clamp-1">Canon EOS R5</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal line-clamp-1">ID: CAM-2023-004</p>
</div>
<div class="shrink-0 text-right">
<p class="text-slate-500 dark:text-slate-400 text-xs font-normal mb-1">Qty</p>
<p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">1</p>
</div>
</div>
<div class="grid grid-cols-[30%_1fr] gap-x-4">
<div class="col-span-2 grid grid-cols-subgrid border-t border-slate-200 dark:border-slate-700 py-4 items-center">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal">Borrower Name</p>
<div class="flex items-center gap-2">
<div class="w-6 h-6 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-xs font-medium text-slate-700 dark:text-slate-300">
                            JD
                        </div>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal">John Doe</p>
</div>
</div>
<div class="col-span-2 grid grid-cols-subgrid border-t border-slate-200 dark:border-slate-700 py-4 items-center">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal">Lending Date</p>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal">Oct 27, 2023 14:30</p>
</div>
<div class="col-span-2 grid grid-cols-subgrid border-t border-slate-200 dark:border-slate-700 py-4 items-start">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal pt-2">Notes (Optional)</p>
<textarea class="w-full text-sm text-slate-900 dark:text-slate-100 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-shadow resize-none" placeholder="Enter any special notes regarding the lending" rows="3"></textarea>
</div>
</div>
</div>
<div class="px-6 py-4 bg-slate-50 dark:bg-slate-900/30 border-t border-slate-200 dark:border-slate-700 flex gap-3 justify-end">
<button class="flex items-center justify-center rounded-lg h-10 px-4 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                Cancel
            </button>
<button class="flex items-center justify-center rounded-lg h-10 px-6 bg-primary text-white text-sm font-bold shadow-sm hover:bg-primary/90 transition-colors">
<span class="material-symbols-outlined mr-2 text-[18px]">check_circle</span>
                Confirm Lending
            </button>
</div>
</div>
</div>

</body></html>
